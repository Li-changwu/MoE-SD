name: Update Dashboard README

on:
  workflow_dispatch:
  push:
    paths:
      - "results/registry/experiment_registry.csv"
      - "results/raw/**"
      - "results/parsed/summary.csv"
      - "results/experiments/**"
      - "tools/sync_registry_from_summary.py"
      - "tools/parse_bench_results.py"
      - "tools/build_decision_dashboard.py"
      - "tools/update_readme_dashboard.py"
      - ".github/workflows/update-dashboard-readme.yml"
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  refresh-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build dashboard artifacts
        run: |
          python tools/parse_bench_results.py \
            --input-dir results/raw \
            --output-dir results/parsed
          python tools/sync_registry_from_summary.py \
            --summary-csv results/parsed/summary.csv \
            --registry-csv results/registry/experiment_registry.csv
          python tools/build_decision_dashboard.py \
            --registry-csv results/registry/experiment_registry.csv \
            --output-html docs/dashboard/optimization_dashboard.html \
            --regression-csv results/parsed/regression_stability.csv

      - name: Update README snapshot
        run: |
          python tools/update_readme_dashboard.py \
            --registry-csv results/registry/experiment_registry.csv \
            --readme README.md \
            --dashboard-rel-path docs/dashboard/optimization_dashboard.html

      - name: Validate dashboard artifacts
        run: |
          python tools/validate_dashboard_refresh.py \
            --registry-csv results/registry/experiment_registry.csv \
            --readme README.md \
            --dashboard-html docs/dashboard/optimization_dashboard.html \
            --min-valid-rows 2 \
            --required-methods no_sd,eagle3

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/dashboard/optimization_dashboard.html results/parsed/regression_stability.csv results/parsed/summary.csv results/registry/experiment_registry.csv
          git commit -m "chore(dashboard): auto-update README snapshot"
          git push
