version: 1
decision_trace_schema:
  request_id: string
  phase:
    type: string
    enum: [prefill, decode, unknown]
  step_id: integer
  component:
    type: string
    enum: [speculation_k, memory_partition, prefetch]
  decision: object
  reason: string
  policy_name: string

rules:
  - each decision must include a non-empty reason
  - each trace row must be alignable by request_id + step_id
  - decision payload must be JSON-serializable
