version: 1
state_schema:
  request:
    request_id: string
    prompt_len: integer
    output_len: integer
    request_rate: number
    phase:
      type: string
      enum: [prefill, decode, unknown]
  runtime:
    step_id: integer
    gpu_mem_used_mb: number
    gpu_mem_total_mb: number
    kv_cache_mb: number
    acceptance_rate: number

validation:
  - request_id must be non-empty
  - prompt_len and output_len must be >= 0
  - acceptance_rate should be in [0.0, 1.0]
