# Issue #22: Memory Pressure 三档实现方案
# gpu_memory_utilization 控制可用显存，间接控制 KV cache 容量

pressure_levels:
  low:
    gpu_memory_utilization: 0.90
    description: "KV cache ~16 GB"
  medium:
    gpu_memory_utilization: 0.75
    description: "KV cache ~9 GB"
  high:
    gpu_memory_utilization: 0.60
    description: "KV cache ~1.8 GB"

common:
  model: "/home/sage3/models/Qwen3-30B-A3B-Instruct-2507"
  speculator: "/home/sage3/models/Qwen3-30B-A3B-Instruct-2507-speculator.eagle3"
  cpu_offload_gb: 30
  max_model_len: 2048
  swap_space: 4
  seed: 42
  enforce_eager: true
