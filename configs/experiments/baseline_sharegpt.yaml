# ShareGPT 基准测试配置
# 使用真实的对话数据而非合成负载

model: "/home/sage3/models/Qwen3-30B-A3B-Instruct-2507"
dataset_file: "data/sharegpt_sample.jsonl"
num_prompts: 100  # 可调整：10, 50, 100, 500
seed: 42

# vLLM 引擎设置
engine_args:
  gpu_memory_utilization: 0.9
  max_model_len: 4096
  tensor_parallel_size: 1
  enforce_eager: false

# 基准测试模式
modes:
  - offline_throughput
  - online_latency

# 输出设置
output_dir: "results/sharegpt"
metadata:
  dataset_source: "anon8231489123/ShareGPT_Vicuna_unfiltered"
  baseline_type: "public_dataset"
  description: "ShareGPT 真实对话数据基准测试"
