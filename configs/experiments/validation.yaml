# SpecMoE Validation Experiment Configuration
# =============================================
# 先行验证实验配置 — 用于 Go/No-Go 决策

model: "/home/sage3/models/Qwen3-30B-A3B-Instruct-2507"
dataset: "data/combined_sharegpt.json"

# Trace collection
trace:
  num_prompts: 50          # 50 prompts, 足够统计显著性
  max_tokens: 128          # 128 decode tokens per prompt
  output: "results/validation/expert_trace.jsonl"

# SD parameters
speculative_decoding:
  K_values: [1, 2, 3, 4, 5]  # sweep range
  primary_K: 3                 # main comparison K
  eagle3_model: "/home/sage3/models/Qwen3-30B-A3B-Instruct-2507-speculator.eagle3"

# Qwen3-30B MoE parameters (from config.json)
moe:
  num_experts: 128
  num_experts_per_tok: 8   # top-k
  num_hidden_layers: 48
  moe_intermediate_size: 768
  hidden_size: 2048
  expert_size_bytes: 9437184  # 3 × 768 × 2048 × 2 (bf16)

# Hypothesis thresholds
thresholds:
  # H1: MAF correlation
  maf_ratio_threshold: 0.95    # real/theoretical < this → correlated
  # H4: Dedup savings
  min_dedup_savings_pct: 15.0
  # H6: SDD prediction
  min_sdd_f1: 0.30
  # H8: SDD precision
  min_sdd_precision: 0.80
  # H9: Cache overlap
  min_interround_overlap: 0.40
  # H10: Reuse distance
  max_reuse_distance: 3.0

# Hardware
hardware:
  gpu: "NVIDIA RTX A6000"
  gpu_memory_gb: 48
  pcie_bandwidth_gbps: 32.0  # PCIe 4.0 x16 theoretical
  cpu_offload_gb: 30
  swap_space_gb: 64
