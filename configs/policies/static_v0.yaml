policy_name: static_v0
controller: static_governor

default_k: 4
prefill_max_k: 2
decode_max_k: 4

memory_pressure:
  medium_ratio: 0.8
  high_ratio: 0.9

acceptance:
  low_threshold: 0.35
  medium_threshold: 0.55

kv_growth_fast_mb: 256

rules:
  - high memory pressure -> reduce K to 1
  - medium memory pressure -> cap K to 2
  - low acceptance -> reduce K
  - fast KV growth -> reserve more KV and shrink speculative budget
  - prefill stays more conservative than decode
