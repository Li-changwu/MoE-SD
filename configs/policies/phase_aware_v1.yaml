policy_name: phase_aware_v1
controller: phase_aware_governor

prefill_max_k: 1
decode_max_k: 4

prefill_memory_bias_kv: 0.70
decode_memory_bias_kv: 0.55

memory_pressure:
  medium_ratio: 0.8
  high_ratio: 0.9

acceptance:
  low_threshold: 0.35

rules:
  - prefill uses conservative K and higher KV reserve to protect TTFT
  - decode allows larger K when pressure and acceptance permit
  - high memory pressure shrinks aggressiveness in both phases
